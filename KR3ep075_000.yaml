front:
  text: 序醫之為道不外規矩神明規矩出自古人而神明則本諸心得心得之學醫案其端倪也周秦漢唐諸書已如六經之典要規矩盡知矣自宋元以來名家治驗方案尤為醫林所尚藉以扶翼先典啓發後學其有裨於天下生命實非淺鮮近世如古今醫案名醫類案葉氏指南吳輯三家醫案吳門治驗録以及潛齋王氏所著江陰柳氏所選多神明於規矩之中而出奇制勝者嘉禾醫士董君受芝潛心醫學與餘論學相契近以所藏松心筆記抄本見示謂得之吳門書友如獲龍宮祕方按法施治輒見奇效余讀之終篇見其議論透闢如喻嘉言靈機活潑如葉天士議病議藥別出心裁亦可謂神明於規矩之至矣雖吉光片羽寥寥僅存而實醫林之寶筏度世之金針也案中有吾家仲醇云云則著者為繆姓無疑焉君夙喜搜羅名醫方案志在刊布嘗謂方案留存不啻昔賢之耳提面命是不可以湮沒不傳余深韙其言慫恿付梓君乃重為編訂囑余為之辨言所藏尚有別種方案議將繼續印行則此書之傳其流播仁術之嚆矢乎癸丑冬日慈溪張和芬書於海上寓廬
