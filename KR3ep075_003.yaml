body:
  text: 卷下魚菟固精丸方論線魚膠八兩蛤粉炒沙蒺藜四兩人乳拌蒸曬乾磨末勿見火菟絲子五兩酒煮曬乾勿見火龍骨四兩煅茯苓三兩生曬遠志二兩甘草水泡炒丹皮三兩生曬石蓮三兩連殼去心炒蓋夫上古之人其知道者法於陰陽和於術數飲食起居各有常節形與神俱藏身甚固至於後世狥欲滅性不思其反腎氣未盛鼓其精房精先溢瀉真陰既虧百病叢起白濁夢遺腎關不固間有異者坎離不媾火炎上水趨下陰精不奉其人多夭揆度奇恆惟交陰斯濟乎陽相火既戡真陰漸復精神內守病安從來余立此方專療虛損其有濕熱諸症者不在治例四製半夏丸方論每半夏一斤初次礬水浸逐日換水用礬末十四兩七日後一日用沸湯泡漉曬乾磨末次用老生薑四斤搗自然汁拌曬乾次用蘇子二兩炒研生白芥子二兩炒研桂枝橘紅各一兩煎濃汁拌曬乾次用竹瀝拌曬乾聽用於朮一斤米泔水浸蒸曬土炒黃耆四兩蜜炙同煎膏以補脾陽霞天膏黃牛肉十斤煎膏以補脾陰用二膏和半夏末為丸痰飲伏於肺胃之間每遇天氣寒暖不時挾風挾寒乘外因而起其中必有澼囊非崇土不能填窠臼非辛溫不能散肺邪治在太陰陽明余造四製半夏丸以去沉痼之痰方中立法頗為嚴密久服必見其功此方脾氣燥結者尤宜若脾泄者當用神術等丸肥人服此更妙益胃丸方論建蓮肉十二兩去心雄豬肚一具煮馬料豆六兩生白茯苓六兩人乳拌霞天膏六兩用蜜炙黃耆一斤紅棗六兩石斛八兩煎膏同霞天膏拌藥末搗和丸血症胃脈鼓指右脅痛此肝葉抵胃勢必妨於食急宜乘其胃氣未散常服人乳牛乳以滋肝陰並服此丸以使脾精四布膠痰漸化所全實多其胃口素弱者固未可一概治宜加減焉加減坎炁丹方論第一方坎炁二十四條枸杞四兩黑芝麻同炒人乳粉二兩四錢人參二兩四錢杜仲八兩為末煉蜜為丸胃氣素弱者切忌用沉陰之品重傷陽明生氣方中枸杞杜仲俱為陰中之陽庶補虛而不礙胃第二方坎炁枸杞人參人乳粉同一方阿膠二兩四錢鹿茸一具酥炙研熟地八兩搗煉蜜丸明薛立齋推廣錢氏之意用六味丸治陰虛症應手立效而丹溪之補陰丸遂廢至趙養葵高鼓峰輩神明其意大暢元機凡加減出入愈奇愈妙可師可法但執此以治外感不無太偏之弊此亦篤信之過也余嘗用其意以治陰虛全活頗多間有非六味丸之可治者以加減坎炁丹治之方中阿膠熟地鹿茸枸杞峻補真陰又以坎炁人乳人參補先天正氣氣正則血充血充則肌膚潤澤筋骨強固而生機勃然矣白霞丹方論熟地蓮肉各八兩血餘人參各四兩萸肉山藥霞天膏白鳳膏各四兩即用二膏糊丸療瘵最難以補脾則傷腎補腎則傷脾也余合兩者兼治之可以立起沉疴至制方之意不過從六味移步換形耳補天丸方論熟地補骨脂各六兩天冬胡桃肉各四兩鹿角霜龜板各三兩共研粉另用黃耆黃精各十二兩煎膏糊丸坎卦陽陷陰中水中有火之象水騰而上升則為精為液火之蒸動而關門利也水聚而上泛則為痰為飲火無以熏灼而關門阻也其注於下則為白濁夢遺移於膀胱則為淋閉消渴壅於內則為水腫脹滿病因雖不同而無火者居其大半則補火為最急然左右兩尺水火平分真陽真陰互為根柢法當兩建以培本原此補天丸之所以作也方中熟地天冬金水相生輔以龜板而衝任理補骨脂胡桃肉木火同氣佐以鹿角而督脈通用二黃大建脾胃之陽以補金之母不用術者恐傷腎也余隨方立法妙合陰陽虛弱者如能久服填精益髓卻病延年捷於影響烏骨雞丸方論烏骨雞一隻男雄女雌縊殺干撏去毛不落水同煮諸藥爛焙乾磨末忌銅鐵器骨炙存性入藥末內雞汁聽用熟地八兩砂仁末拌炒山藥炒萸肉炒芡實炒建蓮去心枇杷葉去毛桑葉九蒸九曬各四兩白花百合六兩澤瀉丹皮阿膠炒茯苓人乳拌蒸各三兩煉蜜為丸癆瘵咳嗽吐痰胃弱脾泄者當急服此以治之記江景賢九令愛久病治驗案江女因失竊被驚旋染時疫醫用發散寒涼之劑痞悶氣逆自汗嗌乾轉甚景賢延余診時乙丑八月初旬也詢其臥床自四月始矣按脈左寸搏指右關微實此因少陰之火不降故上焦之氣壅陽明之路塞故太陰之化滯以驚得之還以驚治初方用葳蕤石蓮肉烏梅陳皮龍齒茯神穀芽神麯與之氣稍順諸症仍不減乃用附子理中加減出入繼服八味湯共三十餘劑當其時口中乾燥幾無點津不更衣者十餘日服桂附後始津迴腸潤因為定八味丸加麥冬辰砂為衣調理之後飲食漸加但臥而不能坐坐即胸中甚悶余靜思其故病在膻中乃授以小丸二細嚼之徐徐嚥下留戀於胸膈間以察其動靜服十餘日胸前連兩脅下甚痛手不可近脈之左寸結余喜曰得之矣因書歸身赤芍桂枝桃仁四味與之服二劑下瘀血頗多痛遂止悶稍緩然猶未盡除也忽於丙寅六月中又染時疫舌苔黃黑發熱不止病益劇復延余診當是時舉家虎率以聽而凡余用藥制方如大將之旗鼓進退從之勢不得不一力擔當以掃除賊寇但吳俗扭於故習視硝黃如砒毒禁藥者已數十年今已經年臥床奄奄一息之弱質豈足以當此使餘力持是說即素傾心相信者聞之必驚且駭依違不斷遷延日久血與邪相搏胃津告竭惟有束手待斃重云見晛無望矣余既持脈見右手關實尺長因與其兄信源密議戒勿泄三下舌黑漸退下後必休養以鼓動其胃氣故一日休養一日疏導最後用生地汁阿膠瓜蔞實芒硝等藥以微利之藥不得下行遂上湧連嘔十餘次吐出膠痰無算舉家驚惶余謂驚則痰積包絡非吐不能出此亦去悶之一助也可無恐吐後果能食粥兩日後又不能食熱亦不止此宿垢未清也以虛體不可再下晨用六味去萸加葳蕤以養其陰晚服資生丸以和其胃半月後始能食粥後命以六味八味丸兼料服午後仍服資生飲食遂日進痞悶漸開余邇來臨證惟此為勁敵其決策用余方以底於成者則其兄信源之力也信源邑庠生館於城外往來奔走不避寒暑真孝友士也附第一煎方經水適來脈微結檳榔益智木香歸身大麻仁大黃炙草花粉桃仁生薑第二方於朮半夏大黃阿膠陳皮木香歸身麻仁第三方益智花粉歸身芒硝木香知母阿膠大黃生薑加水與大黃同打按上三方即案中所謂三下之方也受芝注附小丸方併案病之發由驚而起驚則包絡氣急包絡主中焦為榮血生化之源法當開膻中之急兼通上下二焦天竺黃六錢猺桂心三錢酒炒丹參七錢鬱金六錢益智生研六錢吳萸五錢醋炒歸身七錢鹽水砂仁六錢茯苓七錢酒赤芍七錢制香附六錢酒炒白薇五錢木通五錢人參六錢菖蒲蒸去毛六錢炙龍齒六錢酒炒川芎四錢豬膽汁炒川連四錢與桂萸二味同研以上為末用荷葉五錢煎水化阿膠二兩糊丸每重一錢半丁卯二月復延余診按其脈遲而少胃氣忽斷忽續余訝其何以至是詢之則曰一日只飲米湯兩杯已三月矣余謂信源曰此非參不可信源貧士也勇於為義為其妹久病弗痊又瀕危引為己任余因命朝服理中湯加桂夜服四神丸四劑而能食粥繼用十全大補湯二十餘劑而痊論顧寶善脅痛發黃之症顧寶善常患脅痛痛則連少腹後身熱發黃則漸愈脈之右關尺滑弦此脾邪傳子也而其所以發黃病之故則甚微妙因論之曰君之腎臟本寒龍雷不安其位故肝挾腎邪往往乘釁而欲動適寒邪偶中太陽寒水之經內外合邪水遂聚而上泛惟肝為腎子盜其母氣直衝兩脅土本足以制水乃土衰木克又被水氣所乘釀醞薰蒸遂至發黃是發黃固陽明濕熱之徵實即太陽之出路所以得此為愈期也今試與子觀天地之化天地之化不過陰陽二氣而已發育在春夏保合在秋冬此是老生常談人所共曉之論合之於人身則昧之者多欲求治病其可得乎驚蟄後陽氣畢宣水泉寒龍雷出以龍雷屬陽惡陰寒之氣乘陽之動而俱升也霜降後陽氣退藏水泉溫龍雷伏以龍雷惡陰隨溫和之氣而俱藏也故春夏不見陰非無陰陰在地中秋冬不見陽非無陽陽在地中兩氣循環相為起伏往來屈伸以成一歲試使當藏伏之時鬱蒸異常必有疾雷暴雨此即上衝兩脅之徵也地氣上蒸雲霧四塞而礎潤此即發黃之一徵也讀坎卦一陽在二陰之中陽陷而險水中有火宜順導不宜直折此中有元機也子腎臟無火故土衰而水寡於畏為今之計先治太陽後溫補肝腎斯二火自戢病根永除矣附方五苓散加陳皮丸方六味加肉桂沉香記張嫗瘧疾腸風奇疾治驗案張嫗病瘧發熱口乾胸中甚熱按其心下至腹中則頻蹙且便血不止肛門甚痛脈之右滯而緩左關微弦此怒動肝火陰絡內傷兼之中焦挾食所致因書柴胡淡芩炒楂肉木香陳皮炒黑柿餅生白蜜與之薄暮服藥至夜半諸病悉退明日起於床食粥如平人越三日其家復走告曰近復變一症面左半忽浮腫左脅連上痛心中震盪即覺頭重眩暈予往診肝部按之搏指知其必因暴怒肝火上衝詢之果然與以逍遙散去朮加薄荷勾勾生穀芽沉香亦一劑愈論治天行喉痹方經曰一陰一陽結謂之喉痹一陰肝與心主也一陽膽與三焦也其脈並終於喉火性急速直犯清道閉而不通死不旋踵近來鄉村天行痧毒互相傳染束手待斃不知凡幾予深痛焉因深思治法大旨總在膈上著意或以祛邪或以涼肺或以救敗攻補並施溫涼並用法不膠一中病而止姑書治法數條以備採擇昔明樓全善治喉痹有用薑汁一法其意蓋謂寒閉為外熱鬱為內也予因悟辛開苦泄是大綱凡為寒邪所郁發毒痧喉痹者即用此法從治隨手立愈方意即從東垣普濟消毒飲吳又可達原飲化出因名之曰達原普濟飲厚朴草果連翹薄荷馬勃生草檳榔射干殭蠶大力子滑石竹葉中無停滯者去檳榔厚朴加杏仁便閉加酒製大黃毒痧咽痛嘔逆加減橘皮竹茹湯主之橘皮竹茹藿葉殭蠶牛蒡連翹薄荷射干馬勃嘔逆甚者加半夏知母去竹茹咽痛口燥舌邊赤中黃便秘加減涼膈散微利之連翹梔子人中黃淡芩竹葉川連殭蠶大黃酒炒薄荷白蜜方中加石膏使經腑並瀉喉以納氣喉氣通於天咽以納食嚥氣通於地咽喉俱閉天地之氣並塞非斬關奪門不可一用吐法獨聖散瓜蒂末主之一用開法控涎丹甘遂白芥子大戟主之熱渴大汗脈洪數有力加味白虎湯主之石膏粳米竹葉知母川連杏仁姜皮陰虛加生地嘔逆神昏加竹葉石菖蒲腎陰素虧水不勝火舌苔純黑色如鏡面者六味全料加人中白川連主之虛甚加元參龜板麥冬或用六味變法治之六味加細辛川連神昏加石菖蒲燥渴真陰不足大便秘犀角地黃湯加大黃微利之犀角生地酒製丹皮木通酒軍小便秘導赤散加川連赤苓經曰諸痛癢瘡皆屬於心心與小腸相表裡故用導赤以瀉丙火是即釜底抽薪法痧毒隱伏咽喉腫痛面色青煩躁急與搜邪透毒湯犀角一錢石膏三錢炒研牛蒡三錢炙鱉甲一錢酒洗殭蠶一錢去嘴黑絲炙山甲一錢連翹錢半荊芥二錢酒洗歸身一錢桃仁一錢連皮打沙豬糞六錢重者加一兩研蟬蛻十二個用胡荽二兩蘇葉一兩葛根三錢紅花二錢煎湯頻洗便秘加酒軍二錢毒痧營邪也隨出隨伏是名內陷其症最危苟非多方攻托豈能出死入生予因制搜邪透毒湯可補前人所不備方中犀角石膏清胃救肺歸身桃仁活血破瘀二甲豬糞搜邪透毒更以荊芥牛蒡殭蠶連翹蟬蛻引營分之邪達之於表陷者可立起矣背城一戰轉敗為功其在斯乎發熱咽痛口乾唇燥舌心黃邊赤大便秘結緣其人素陰虛今復有所感熱則傷營津液內涸宜表裡雙解並和其陰通幽清燥養營湯主之犀角一錢鮮生地汁一兩炒牛蒡三錢馬勃一錢連翹一錢半製大黃一錢酒洗殭蠶三錢花粉三錢黑梔一錢麻仁四錢薄荷一錢甘草四分兩足無力不可下去生地制軍加知母二錢芝麻五錢杏仁三錢菠薐一兩如無用青菜代之硼砂通聖散治喉痹急症山茨菇二兩硼砂二兩山豆根一兩半大戟一兩五錢五倍子二兩青黛錢半白芥子一兩二錢冰片二錢麝香二錢雄黃三錢殭蠶酒洗一兩二錢人中白一兩二錢共研成細末將藥吹入咽喉徐徐嚥下清膈飲人中黃二錢硼砂四分龍腦香三釐萊菔汁調和徐嚥下咽痛自利金液代刀散和以金汁徐服自止方見前記江景賢足疾治驗案江景賢足疾十趾甚痛余曰此因於寒濕病在足太陽冬月斂藏不宜大汗試以湯洗之因授以大青龍全方洗二次愈記方姓等驗案七則湖州書客方姓目赤如鳩夢泄不禁夜不敢寐足冷如冰脈之左關沉細而緊葉天士曾以異類有情丸治之不效後用桂附亦不效余知其病在厥陰用魚膠八兩菟絲子五兩茯苓三兩石蓮四兩沙苑子四兩益智二兩歸身三兩醋炒枸杞四兩用青鹽小茴香酒醋各制一次鹿角膠三兩糊丸服後病勢即減黃掌書夢泄小便數左寸關微搏此二火不能降當服六味全料去澤瀉加魚膠六兩龍骨四兩沙苑子四兩遠志益智各三兩石蓮六兩菟絲子四兩未及半料而愈姜義源胃脘痛脾泄夢遺右脈弦緊法當溫中固腎書丸方與之於朮土炒二兩製附子一兩二錢乾薑五錢神麯半兩薑汁熟地四兩加益智四錢龍骨茯苓各二兩枸杞小茴拌炒菟絲子酒炒沙苑子石蓮各三兩蜜丸服後諸症悉愈吳生夢泄不禁腰膝痠疼余以王荊公妙香散合茯菟丸兩方加減與之沙苑子菟絲子杜仲各三錢茯苓神龍骨各二錢石蓮四錢遠志八分益智七分調入辰砂一字服二劑後竟止如不服則病又來語余曰此真仙方也予命其多服以除根沈生患奇疾胸中常悶飲食少進已數月矣詣余診脈則右關弦滑而緊余曰此胸中陽氣不舒陰邪微結即仲聖所云胸痹也法當通陽授以瓜蔞薤白白酒湯加半夏五劑瘳宋天芬夫人素患癖後忽有氣從少腹上衝至心下或從少腹之右起痛不可忍稍有驚恐即上升一日數發余診其脈心小而膽伏氣逆裡急衝脈為病其為沖疝無疑但所異者稍有所聞即攻觸作痛心脈又如此若徒治足經不從手經著意總難洞中要害焉能除卻病根因構一方統二厥陰而兼治之棗仁茯神茯苓白芍炙草小茴橘核二劑愈馮大文素善咳且病噎已半年矣一日因塚孫暴亡郁甚病益劇水漿下咽即吐且艱澀異常腹中微痛大便秘結如是者數日延余診脈之少和潤之致予曰腸胃津液乾枯遂致傳道下秘濁氣上升嘔逆亦勢所必至為今之計非大養營血不可為定煎方治之人乳藕汁各一杯白蜜二錢薑汁五匙沉香磨汁四茶匙黑芝麻四錢柏子霜三錢杷葉一錢三味煎服後嘔逆即止能食粥矣又方柏子仁霜穀芽各三錢芝麻五錢杷葉一錢藕汁人乳蔗漿各一杯沉香汁四匙薑汁五匙白蜜三錢朝服牛乳晚服杏仁黑芝麻酪後大便通又方制首烏一錢半柏子霜粳米白蜜各三錢紫菀二錢杷葉一錢半黑芝麻五錢藕汁一杯薑汁五匙沉香汁四匙蔗漿一杯又方即前方加歸身二錢去蔗漿紫菀又方生地柏仁霜各二錢歸身紫菀制首烏各二錢精羊肉一兩半生薑一錢黑芝麻五錢水研漿濾去渣衝入又方前方去紫菀芝麻加肉蓯蓉二錢又方加鎖陽三錢贊化丹種子方論此方有補有瀉有通有塞古方若六味都氣葆真還少萃仙八聖青娥聚精五子衍宗千金種子悉包羅在內運思十餘日而成延年種子其在斯乎熟地八兩酒拌制茯苓四兩烘蓯蓉三兩與羊腎同煮骨脂三兩酒炒山萸肉四兩烘川斷四兩酒炒丹皮三兩酒曬小茴兩半青鹽拌炒沙苑子三兩人乳拌蒸一次枸杞四兩酒拌焙覆盆子三兩曬五味三兩烘巴戟三兩酒拌焙菟絲子四兩益智二兩鹽水炒川楝子三兩煮曬懷藥四兩炒遠志四兩甘草湯浸一宿焙線膠六兩龍骨粉炒杜仲四兩曬芡實四兩生沉香兩半勿經火蓮鬚四兩曬鹿腎五具酥炙澤瀉三兩炒羊腎內外各三副酒煮上藥用鹿膠一斤用羊腎打糊丸如桐子大每服三四錢好酒送下雜記李姓等治驗方案李右金沉木浮水降火升天地之五行以順為正而人身之五行以逆為順故金浮木沉水升火降方合常度今反是焉得不病少陰之神機在水火而其交合處在土治此病當於此中求之易曰五位相得而各有合知其合處治法可以微參而得之於朮石決明茯苓沉香汁麥冬川連牛角䚡桔梗白花百合杜仲又奇脈不司統攝脾虛泄瀉氣逆不得臥議從中治兼理奇經淮山藥一兩切塊制於術一錢煎湯拌炒紫石英杜仲百合沙苑子湘蓮又心肝之火上炎故口中碎火上則水下帶濁之所以愈甚也於朮石決明沉香杜仲菟餅椿根皮川連牛角䚡百合元參沙苑又微發熱晝夜泄瀉十餘行雖曰霍亂想其乘虛下陷也宜進少陰篇四逆散從少陽之樞轉出似為近理柴胡白芍枳實白朮川樸炙草薤白頭另煎衝入又身熱下痢乾嘔而渴胸中痞悶診脈不浮不沉而數此風溫症而邪有乘虛陷入之象深為可慮議從陽明升舉擬仲聖葛根湯之例不必襲其方此許學士法也豆卷桔梗厚朴葛根穀芽橘白茯苓花粉於朮又脈象虛數風陽頻動不食而眩暈肝犯脾及胃中無砥柱矣議用四君子湯加入鎮攝之品以防其厥逆四君子湯加決明牡蠣藕端士先生十八九歲嘔血寫煎方囑其服二十劑丸方服兩料後按服六味丸五年至今三十五歲不發按人之一身水欲其升火欲其降有泰象也乃自縱欲而不知節腎關不固白濁夢泄諸症悉生火炎上水趨下陰精不固遂成不交之否精也血也水也名為三而實則一故精傷而且咯血矣精既傷氣亦隨之所謂精者陰也氣者陽也畏寒即傷氣之證治法宜填宜固宜攝後當更補其陰中之陽斯可收全效熟地黑殼建蓮芡實料豆皮蓮鬚大淡菜藕又病因染疫失調遂咯血此必因去邪之故奪汗傷營致此今年復發且多盜汗此非衛外陽虛由陰火內逼而使之出宜養陰以固之若投固表之劑如黃耆之類恐氣升而里愈虛矣熟地淮麥穭豆皮茯神白芍藕牡蠣又嘔血不止於填陰中用堵截法熟地三七阿膠穭豆皮花蕊石大淡菜沙參扁豆沖童便一小杯丸方龜板炙線膠蛤粉炒湘蓮芡實粉蓮鬚豬脊髓金櫻子去心焙各四兩淡菜八兩焙石決明煅牡蠣茯神各三兩五味炒二兩遠志炭飛辰砂各一兩用懷山藥四兩炒黃煮漿和入豬脊髓搗丸端士先生四弟媳懷妊七月胎氣上衝動躍竟日呼號腹痛如割松心老人適他出延他醫診治服安胎藥胎不動而腹痛更甚醫者以為胎死腹中欲下之而加入人參適老人歸延視才到即問可曾下血病家答曰未下先生曰痛在氣分未到血分遂定一方服一劑全愈越三日分娩母子安好案胎元不安以暑濕之邪擾中為患語云通則不痛必有所阻矣氣分不宣理應有之胎氣上衝亦因乎此議和中安胎法蘇梗三分花露磨沖炒半曲錢半陳皮一錢佛手皮錢半炒麥仁三錢荷花露半杯加青苧三錢紋銀一錠又衝陽挾肝邪上逆血遂溢議進大補陰煎熟地一兩川柏一錢鹽水炒龜板六錢炙知母錢半鹽水炒蛤殼一兩牡蠣一兩六錢藕汁一酒杯沖李某脈滑多痰痰即濕邪之出路宣通濕鬱即不成痹生白朮陳皮萆薢木瓜半夏茯苓米仁又中虛有濕以健脾祛濕為主生於術白麻骨續斷杜仲茯苓木瓜米仁茯神又三氣襲入多成痹症此屬行痹以風勝而往來無定也酒濕易成熱辛溫難進主以淡滲兼用通絡法茯神萆薢山藥藤海桐皮木瓜桑枝絡石藤又方豆卷萆薢防己秦艽木瓜薑黃苡仁黃松節茯苓桑枝附調經種子保胎神效方細地料豆衣杜仲川石斛各三錢青蒿子沙苑子生麥芽炒丹皮炒黑橘核四制香附各錢半白薇杞子炭淡芩各一錢牛角䚡燒赤存性二錢炒黑小茴香五分上藥於行經前二日服起連服三劑下月照服經調有倍搗生地為丸每服三錢並能保胎中間缺文八字以意念會之有字下必系孕字云云
