body:
  text: 卷上半術丸等方治驗案半夏製法礬湯浸七日逐日換水用自然薑汁拌三次愈陳愈妙六兩真茅朮製法米泔水浸一晝夜刮去皮毛切片曬乾不見火生用用大棗煮膏和丸術麻加半夏丸真茅朮六兩製法照前製半夏四兩巨勝子三兩略炒用大棗煮膏和丸又許學士神術丸見本草綱目六君加耆朮丸人參五錢至一兩茅朮八錢生用半夏一兩黃耆兩半炙茯苓二兩甘草七錢陳皮八錢於朮一兩六錢土炒用龍眼肉六兩棗肉八兩煮膏糊丸吾母苦支飲發時聲如拽鋸喘息不得臥飲食俱廢遍求良醫調治皆不效余博覽方書深思其故恍然有得明賢王節齊謂痰之本在腎痰之標在脾肺自是不易之論而余則謂痰之本固在腎而以脾肺相較則脾又為標中之本蓋痰即水也積而為飲中必有澼囊不盈科不行其故在於脾虛亦由於胃弱不能制水所致經曰腎者胃之關關門不利故聚水而從其類此至言也法當補火消陰翳則莫若八味丸此調理之法也至論病發必由於肺治法最難蓋肺主皮毛衛氣既弱風寒從皮毛而入漸見咳嗽咳嗽必有痰咯出則氣順否則氣逆當其時若用葶藶等湯則以虛作實而傷上焦之氣若用六君等湯則反客為主而錮當去之邪所以諸醫或用小青龍湯或用葶藶大棗湯而全不效者比比皆是則莫若於欲發未發之時一見咳嗽即用半術以消之如效則不必復進他藥不效則進術麻加半丸神術丸無不應手立愈較之專治肺者似高出一等矣故特記之以為治飲者法諸方皆用生茅朮蓋術性燥能助胃氣上行下安太陰專治水飲之澼囊又能發汗此即小青龍用桂枝之義仲景八味丸術麻加耆丸此即術麻加半丸用炙耆十兩大棗八兩煎膏糊丸此方之作余專為病飲者而設也今人參之貴十倍於昔貧人欲服六君子難矣余用此方代之其中卻有至理蒼朮發汗去濕黃耆止汗固衛補中有發發中有補互相為用而所以升陽益胃救肺者在是矣是亦可為治飲之一助故並載之吾母病發時多在春夏之交其故醫皆不曉並不深究其所以然豈非粗心余謂春時木旺剋土上及於肺者母病則子亦病之意盛夏溽暑濕熱之氣上行脾不能為胃行其津液故不輸於肺者皆變為痰磁朱七味都氣丸方治驗案熟地八兩酒拌蒸曬加砂仁八錢懷山藥四兩炒山萸肉四兩炒丹皮三兩澤瀉三兩鹽炒茯苓三兩北五味三兩鹽水炒桂心八錢魚膠四兩蛤粉炒成珠靈磁石一兩煅醋淬九次硃砂一兩水飛為衣煉蜜丸餘數年來忽得怔忡病耳中時聞風雨聲夜間更甚後竟一無所聞此勞心太過所致也病在上者當取之下遂制此方服未及半料而耳已聰心亦寧矣名之曰磁朱七味都氣丸菟絲煎方治驗案菟絲子三錢酒炒補骨脂二錢酒炒小茴香六分炒研桑螵蛸錢半炙黃覆盆子錢半酒炒生益智子一錢研當歸錢半酒炒四肢少力加杜仲二三錢一婦夜間遺溺已十餘年矣後復患脾泄日三四行左半身麻木四肢無力余謂此肝脾虧損之症以菟絲煎加杜仲三劑而瘳六味加柴黃甘草飲方治驗案熟地二錢山萸肉八分炒茯苓一錢山藥一錢炒澤瀉八分柴胡梢四分生黃耆錢半甘草梢五分一女年十二歲日晡發熱多盜汗達旦則止日漸黃瘦飲食減少四肢無力醫以為童癆辭不治脈之寸關弦緊余曰此風寒客於肌膚故蒸蒸發熱既久津液漸虧當從內傷治而散其表邪若用地骨皮花粉知母等藥是猶抱薪救火何益於事遂先以藿葉生黃耆懷山藥生穀芽砂仁穀神曲與之盜汗漸止復以六味加柴耆甘草飲與之二劑而瘳六味合生脈黃耆飲方治驗案人參麥冬五味茯苓山藥黃耆熟地山萸肉澤瀉丹皮一室女於午後虛火上炎而面不赤自汗如雨手足厥逆日四五發脈之右寸浮而不斂左脈澀此陽虛陰虧之症法當大補與以六味合生脈黃耆飲六劑而愈六味智荷飲方治驗案熟地四錢山萸肉一錢山藥二錢丹皮錢半益智仁一錢生用茯苓錢半澤瀉一錢荷葉一錢一婦傍晚即發熱止在腹以下手心亦熱腹以上則與平人無異脈右關微緊左細而澀此本營分數虧兼之少陽之氣又下陷於肝腎郁者當達非升不可用薛氏法而少變也製為六味智荷飲加薑棗煎四劑而瘥千金散方治驗案人參一錢茯苓八分陳皮六分於朮一錢土炒炙草六分丁香六分不見火木香八分乾薑一錢製半夏八分製附子二錢為末小兒未周歲者每服三分一歲以上每服六分至八分為度連用二三服立愈侄夢麟甫五歲染時疾發痧毒面上生赤瘡瘡俱爛服清火解毒藥不下數十劑方盈卷矣而疾猶未已一日忽目上視脈之左弦數右弦而豁然空現慢脾風證法當用參附即命合千金散千金散者玉峰朱又渠所贈方也方乃古法加減可以備急藥未成而面色已轉青痰涎如潮湧危在傾刻延醫診視俱謝不治而藥猶擬羚羊角等味謂其痧後餘毒未盡故見症如此余兄意其必不起也預為置後事而悉聽余治之命以千金散灌下痰愈甚已而稍蘇又命灌之勢稍定五更後忽發煩躁聲響而直目左右視舌弄而不能收揚手擲足一如陽證明日更劇此虛陽外越非重用溫補則脫矣與以六君子加姜附湯傍晚腹瀉即以前法加重參附佐以丹皮竹瀝與之明日唇燥烈小便赤厚而濁如黃土色舉家怪之余曰無足異也此心移熱於小腸耳命以茯苓竹葉煎湯代茶而仍用前方稍減附子與之明日神氣稍靜方見虛象而昨宵竟不得寐魂不歸肝當為斂之於前方中加當歸棗仁丹皮竹瀝一劑而得睡再劑而蘇涼膈加石膏等方治驗案一女年九歲於七月中發熱不止後則牙關緊目上視諸醫或以為暑風或以為驚風愈治愈劇余按其脈實而有力欲驗其舌舌縮不能出撬其齒視之上半截不可見下半截舌心黃厚而邊獨紅挾口環唇皆見青色夫牙關頰車為手足陽明交會之地今症如此熱邪已聚胃不下不生庸醫猶妄引經論以暑風驚風治此真刻舟求劍焉得不殺人余遂以涼膈散去芒硝加石膏用生大黃同搗加水研漿沖服夜未半即大下明日牙關寬復以白虎合天水散汗之遂熱退身涼明日視之尚未能言舌黃未淨再以小承氣加青黛石菖蒲石膏去其未淨之邪而其父母則謂其女已大虛恐不可再下遂不服復延他醫診視見余方咋舌但言好大膽服其藥腹中覺痛後竟不可忍旦夕叫號渠告急於余余惡其昧也不往後復託人來言彼固自知其昧也已大悔也余笑曰彼畏其虛少用一帖硝黃誰知卻是增病若必欲余往仍不變前日方也渠許諾遂與以小承氣一劑而腹痛如失抱桐年丈金液代刀散方論石膏二兩寒水石半兩蓬砂半兩元明粉兩半上石臼同杏仁杵粉大黃二兩切片醋炒杏仁一兩二錢去皮尖同上藥杵和則入藥不油薄荷淨葉八錢殭蠶一兩二錢去嘴足洗淨去絲焙乾酒漿拌炒射干一兩牛蒡子一兩二錢炒研同磨篩極細貯磁瓶每服二錢用真金汁清如梅雨水者一茶杯調入徐徐咽之輕者一二服重者三四服必愈抱桐年丈精於岐黃其治時疫也無不應手立愈直如庖丁之解牛余曾寄一札討論醫理復書云今之時氣即昔之傷寒求如仲景書所稱已不復有僕癸丑年治一千七百餘症而合於仲景之傷寒者不過二人學醫如先生真可謂善於識變者矣先生之立是方也為今之毒痧下痢者而設其自題云天行疫毒又兼喉痹毒甚症急故死不旋踵承氣不能肅膈上之邪涼膈不能救燎原之勢須用金液代刀散記烏鹿正陽丹方何首烏六兩黑豆拌蒸曬懷山藥四兩炒為末用真鹿膠糊丸瘧後體虛或腹中作瀉或往來寒熱皆由陽氣之弱須用此丸治之記霞天聚聖丹方昔韓飛霞造麴有十法內中有香附蒼朮撫芎等分敖膏和半夏末作曲名開鬱曲有用黃牛肉煎汁熬膏和半夏末為曲名霞天曲一治郁痰一治沉疴錮痰余參用其意以之治飲大有殊功檳蘇順氣飲方論檳榔錢半蘇葉二錢藿香一錢草果六分切研厚朴一錢薑汁炒陳皮一錢酒藥三錢陳者佳炒生益智七分生研加法咽乾口乾加黃芩花粉各一錢膈上痞悶加枳殼一錢腹中脹滿用益智殼六七分易益智仁咽痛紅腫加殭蠶三錢去嘴足洗淨絲炒研牛蒡子二三錢連翹一錢去益智輕者加桔梗一錢生甘草五分不必用殭蠶嘔逆加半夏咳嗽加杏仁轉筋加宣木瓜一錢小便短赤加山梔一錢炒黑知母半錢中氣鬱結三焦不通加木香七分或生香附七八分如有頭痛等症照吳氏三陽加法時邪初起頭痛發熱畏寒畏風或嘔逆腹痛其舌苔必白此為熱因寒束最忌寒涼之劑若一用涼藥則迫之使入內而傳胃矣而隨經之邪何由輸泄余立此辛溫雙解法隨症加減表裡分消以之施治百不失一不敢自私願同公好赤柳甘露飲方論赤柳木四錢蔗漿一杯將赤柳木煎一杯與蔗漿對衝痧疹之發由於肺非溫不能外達陽和布令草木繁茂義可見矣柳柳鹹溫蔗漿甘寒一以潤肺燥一以透肺邪一二服後立見起發永無內陷之患真神物也按赤柳木一名柳柳即今之西河柳吾家仲醇極言其妙其言曰凡疹類發不出喘咳煩悶躁亂用西河柳葉風乾為細末水調四錢立定此神祕方也砂糖調服兼可治疹後痢時醫以其溫而去之殊謬乙丑春間余家子侄輩俱發疹其不能透發者余即用此方治之不及半日已紅活矣愈信古人之不欺我也六味加柴甘等方治驗案馮靜生久瘧後只寒不熱腹中作瀉不思食耳聾咽腫脈沉細一醫以薄荷牛蒡山豆根等藥與之余謂之曰此少陽之邪未盡虛火上炎所致非服薑附不可否則必斃矣渠不信服其藥而彌甚余曰子咽痛紅腫喜寒畏熱固無足怪請先為子治耳聾如何渠許諾因與六味加柴胡梢甘草梢二劑而耳已聰咽痛稍可後與以八味加麥冬補中益氣去甘草加智附神麯二劑而飲食倍進腹瀉亦止後十餘日復往來寒熱盜汗如雨胸膈痞悶作瀉並不能食脈之則以食復而又感於寒始用桂枝湯加柴耆智皮芩曲而寒熱悉退繼以補中益氣合桂枝湯去草加附曲而痞悶頓開忽復咽痛紅腫此郁陽暴伸陰虧所致命以六味加甘桔連翹多服數劑聞五日內瘳矣此症在前宜用辛溫在後宜用滋潤苟一錯誤禍如反掌醫之所以難也可不慎歟桂枝湯加味治驗案江生仁源館於吳氏其徒瘧愈後復發間日往來寒熱七日不更衣仁源同其乃翁來邀余余詢其病勢則曰醫言此證極虛汗下即恐脫矣惟當專事補耳愈後當酬吾三十金否則不能醫也昨已服人參一劑而勢轉劇奈何余曰此非疫瘧即常瘧藥且不必服俟明日診後方定翁急欲同往余曰無恐此固緩症耳明日診視舌苔微白面色帶青脈之右關稍弦緊此少陽兼太陽症而偶傷於食法當和解書桂枝湯去甘草加參茯歸皮益智穀芽薑棗煎並命服藥後飲熱稀粥溫覆以取微汗翁見方即大駭曰昨服人參一錢寒熱不止汗且出兩醫來皆言汗非所宜當倍用人參以斂汗遂加至二錢今參止寫五分反用桂枝以解表恐有虛虛之禍余曰吾豈不知人參為截瘧之聖藥彼特未審其所因耳今病之發也由於風傷衛瘧邪之未盡者遂來併合桂枝者太陽之專藥用以解肌而假芍藥以為監製並佐以辛溫之品使之通營衛調其陰陽而少陽之邪不煩治而自解此正如假途滅虢因利乘便可無亡矢遺鏃之費而又何汗之足慮乎如余方服之一劑瘥甘麥大棗湯加味治驗案生草二茯大棗連翹小麥萱花王綸音忽得怪症笑時即淚出必大慟而後快諸醫不識餘脈之左寸實問其口苦乎應曰然以生草連翹殼二茯大棗與之一劑而心中豁然開爽病去八九明日復診加小麥萱花命其多服數劑人訝其愈之甚速有問於余者余曰此手厥陰心包絡之疾也經云心主舌其在天為熱在地為火在聲為笑在變動為憂又云膻中者臣使之官喜樂出焉夫少陰厥陰體用雖分而其象則皆應喜出悲愁既久所司亦失其職火性上炎變且百出故其哭者積憂之所發也經亦云肺在聲為哭在志為憂憂傷肺喜勝憂今無喜之可勝而憂之象適應肺宜其號泣而不能自禁也且夫笑者心之本體哭者心之變象淚者肝之見端彼以憂易喜是猶將牿亡之性也而清夜平旦之時萌糵猶存故先有笑以呈其未亡之性而即繼之以哭猶之乎牿之反復其天真隨現隨隱不能自持此猶幸病之方發其根未深逮相尋既久其先哭而後號咷者將止見號咷而並無所謂笑者矣至於淚隨笑出是心肝二部之火所致蓋心憂則肝氣必郁以類相感金從火化故肺葉遂舉而上溢為淚且心與肝實子母也子病則母亦病相因之理勢所必至昔仲景治婦人臟躁症用甘麥大棗湯余師其意一劑而愈亦其常耳而又何異乎伏龍肝飲等治驗案灶心土二兩研細砂糖一兩炒枯炮姜二錢乙丑十一日李八患赤痢腹痛後純下血水或帶紫日夜十餘行畏寒手足厥逆脈之右關沉細而無力余謂之曰汝症極險所喜者從未服藥若使庸醫治鮮有不用芩連矣汝何得生乎即為疏一方以紅曲煨木香炮薑陳皮茯苓澤瀉穀芽與之痢較前略減而腹以下有氣往來並見其形因用戊己湯川連茱萸白芍加紅曲骨脂茴香茯苓穀芽治之而痢竟止乃即以前方加肉果令其調理自謂可無費經營矣而渠一劑後果安適不可言大便已易紅為黃至二劑則痢仍來復詣余診余思前方已為辛溫之劑而終不止者腸胃大傷之故遂用伏龍肝為君溫土臟佐以炮姜加炒枯砂糖去其瘀積之未行者命濃煎代茶日四五服明日竟止命再服更為制理中加減煎方自是遂不相復聞後知其霍然久矣經云必先歲氣毋伐天和今時屆仲冬火土退位況太陰司天寒水在泉苟泥於熱之一說竟用寒涼以伐胃氣則禍不旋踵醫之難也如此六味加骨碎補川斛方治驗案蠡市金姓業農者也患齒衄四肢無力飲食日減業幾廢詣余診按其脈右三部俱洪知其陽明經氣獨盛於是用大劑六味加骨碎補麥冬川斛與之三劑竟止令常服除根即將前方改作丸方華亭王甥暑症治驗案丙寅五月王甥忽發熱無汗余以為暑風也用香薷飲之類治之不效延郡中幼科診視群謂舍此別無良法如余治之亦不效後忽面見青色腹中微瀉以手自弄其舌醫又謂將轉慢驚余審視其舌赤而有芒刺與之水一飲立盡命取西瓜汁與之皆以其腹瀉故似有難色余曰無害也今歲少陽司天五月為三之氣正少陽相火之位且歲火太過炎暑流行火症十居八九舌赤煩躁大渴引飲其顯而可見者也至論其微主運屬寒水火兼水化熱因寒束現象似虛據症則實醫家最易錯認色之見青者厥陰風木在泉之應也腹之微瀉者肺移熱於大腸火迫下注也今欲於流金爍石之時變而為清涼世界必遵內經熱淫於內治以鹹寒之法因仿河間意白虎湯合涼膈散去硝黃以殺其勢再用犀角地黃去白芍合導赤加竹葉竹茹以休息之復用白虎加芩連竹葉而熱渴逐減調理四日而愈補中益氣變方論小變法人參陳皮煨葛根炙草於朮黃耆當歸身荷葉大變法人參黃耆炙草山藥砂仁殼荷葉阿膠鮮稻葉或以穀精草代之經云邪害空竅陽氣者閉塞地氣者冒明雲霧不精則上應白露不降交通不表萬物命故不施東垣先生洞見此旨立補中益氣湯用升柴以提出陰中之陽清升而濁自降其源出於潔古老人而神明變化更覺青出於藍此真培脾胃之聖方凡清陽之下陷者俱可藉是以提出也立齊宗李氏之學用治內傷隨手輒應其加味尤為精妙可謂心心相印矣蓋嘗論之提法有未可一概者真陰未虧龍潛海底因法施治其效立收至若根柢不固虛火燔灼一用升提飛揚跋扈遂不可制所害非淺余因宗東垣之意參用潔古法製為大變小變方以補其闕略師古而不泥古庶不為東垣之罪人矣記程亦曾乃郎不治案程亦曾乃郎初患疳症右目失明以致脾胃虛弱後忽染時疫晝夜發熱經十四日不解大便不通者七日延余診余曰正虛邪實非下不生下則恐脫即不脫胃氣亦難復初疳發於肝失其滋養木已槁矣法庚日死亦曾促余定方余姑為背水陳以求出死入生因用人參四分鹽水炒金汁小半杯羚羊角一錢五分滑石二錢生草四分瓜蔞霜錢半玄精石一錢肆中不備以寒水石代之加竹瀝竹葉使服之即大下得燥屎五六枚並有膠黏如漆者胃氣終不復熱終不解乃知平日本善啖凡所嗜食皆難化之物乃翁弗禁也以故脾胃大傷兼之畏醫如虎視藥如鴆服一劑後竟不肯再服後漸不食如期而殞丙寅四月初九甲戌日診十五日庚辰日故此胃絡脈絶也宋廷良母夫人頭風治驗案宋母患肝厥延余診余始用煎劑治之後定調理方用六味全料參用韓氏異類有情丸加龍齒牡蠣龜板阿膠虎頭骨併為書案曰頭痛頸脈動肝陽上冒至巔為厥賊邪傳子舌生芒刺脈之左寸關沉弦而橫水虧營弱龍雷併發非可以苦寒直折宜以滋為伏壯陰和陽客有不達制方之意問於余者余曰六味丸乙癸同治之法也然草根樹皮豈若異類有情之品其相入為尤速夫天下之至變者莫如龍吾用龍齒先入肝以安其魂從其類也阿膠其佐也牡蠣龜板一則頑鈍無知一則資性靈異其質皆厚重使就其窟穴而招之導龍入海即漸化其飛揚跋扈之性虎為西方之獸可以平木用頭骨者取其象也制即為生引即為伏龍蟄而不見利其普哉經曰亢則害承乃制明乎此義可以論方矣記餘二便濁症治驗案餘二以賣魚為業忽患便濁精溺俱赤鮮血淋漓腰痛不止誤用生地木通瞿麥之類治之病益劇詣余診問其溺時痛乎曰否余曰痛者為實不痛者為虛房欲傷腎坎離不媾精乃不藏若作淋治危矣因書菟絲子石蓮肉茯苓遠志益智子沙蒺藜杜仲與之病稍減復用六味全料加車前牛膝菟絲子石蓮肉蒺藜龍骨杜仲遠志數劑遂愈此症溲溺當利通因通用精房宜固塞因塞用一通一塞有精意焉非細心審察難治之也記沈佐周室肝火沖膈症治驗案沈佐周室胸膈痞悶心中時痛夜不得寐且神思不慧飲食寒暖幾不自知又不能食食則䐜脹群醫投以補心安神之劑皆不效余按其脈右寸忽起忽伏即知其切脈時氣之升降有順有逆為肝葉抵胃所致詢之果然左寸澀而鬱澀為血少血不榮肝則火上炎沖膈天君亦為之震蕩郁為氣結氣結則不宣暢木下行剋土脾輪亦因之不運治先宜安頓膈下而膈上諸病可不治而愈此導河自積石法也因用白芍炙草茯神神麯香附沉香和其肝脾調其逆氣數劑而瘥記瑤琴婢目赤治驗案昔張子和論治目疾之法凡暴赤腫者有出血最急之語故用針刺神庭上星囟會前頂百會五穴考之於經五穴俱督脈所至神庭直鼻入髮際五分督足太陽陽明三脈之會禁針針則發狂喪明而子和獨用針法以建奇功術亦神矣其次則用吐下二法亦無不效千載而下讀子和書者固無其人即讀之豈能深信不惑而能見之行事乎余於針法未曾深究曾治一婢卻以下而見其愈之神速者益信子和之不欺我也婢瑤琴目赤腫痛余治之許以十日愈始用導赤散加天冬山梔黃連丹皮連翹燈心為引一劑痛止繼用涼膈加黃連竹葉甘菊大下六七行目開赤退兩劑而病如失未及四日而愈記李八妻奇疾治驗案李八妻得奇症口乾腹中自左至右皆痛大小便亦然俯而不能仰月事淋漓不斷余初投以逍遙散口乾稍可他症如故因為之靜思竟日恍悟其病得之奇經不可徒責足厥陰也因書烏賊骨赤石脂艾茸鹿角霜四味與一服愈後忽聞食香則腹中有物自下至上若索食狀即痛不可忍此臟寒蛔入膈所致命每日服川椒三十粒痛遂止記金志成風痱驗案附李嫗案尊證已食如飢耳中作金鼓聲即煩重苦暈日數十發脈右尺弱兩關皆弦絡脈空虛賊風數至陽邪乘陽重門洞開將成風痱矣治不出峻補命門四字而按症施治卻有次第不可紊亂夫厥陰風木與少陽相火同居火發必風生風生必挾木勢以侮脾土理宜食減而反已食如飢者虛風入胃適為胃陽增其火矣此去病成為消中不遠昔嘉言曾有胃風湯一法卻未可遽施膽藏肝短葉間其脈上抵頭角下耳後其支者從耳後入耳中出走耳前至目鋭眥後肝脈循喉嚨之後上入顙連目系上出額與督脈會於巔二經本相連故見症如此是經所謂諸風掉弦皆屬於肝而耳中虛鳴又不可專責之腎也然乙癸同治必補腎以滋肝則八味丸加沉香在所必服而斬關直入攝納虛陽無如用真武湯加沉香川石斛降龍伏虎在此一舉君其勉之如余言服數劑遂愈附丸方薑汁竹瀝製半夏用霞天膏四份糊丸晨服八味丸全料加沉香一兩虎頭骨三兩杜仲四兩鹿角膠霜各四兩霞天膏代蜜糊丸晚服李嫗患頭目眩暈閉目不敢開開時即天旋地轉如是兩晝夜余與真武湯二劑已四五培元粉方論百合十六兩煮熟搗爛同諸末拌和再磨末芡實六兩炒焦飯滯六兩炒山藥八兩炒蓮肉八兩去心炒薏米八兩炒穀芽三兩炒麥芽三兩炒神麯三兩炒砂仁三兩去衣炒粳米三十二兩炒糯米十六兩炒共淨末七斤加法於朮三兩土炒扁豆五兩炒糯米二十四兩芡實八兩炒薏米六兩炒淨末八斤按糯米薏米兩味分兩不合必系誤録似當刪去禾芬注易曰大哉乾元萬物資始至哉坤元萬物資生人身小天地其藏象悉皆應之故肺主氣其象如天天道下濟而光明其在經曰肺朝百脈輸精於皮毛脾為孤藏灌溉四旁其象應地地道卑而上行其在經曰脾氣散精上歸於肺通調水道下輸膀胱若使土不生金則肺氣先絶其見於外者毛髮憔悴形容枯槁咳嗽氣促不能言諸病叢生變症蜂起其禍可勝言哉余深憫之因構思一方培補後天以滋化源名之曰四五培元粉取地四生金天五生土之義其中藥品之多少分兩之輕重頗費斟酌自謂得資生丸之遺意方中用百合為君山藥為臣是子母相生法以蓮肉薏米芡實粳米糯米為佐飯滯穀芽神麯砂仁為使是補消兼行法不溫不燥養胃生肺升降之道通地天之泰合衛生之法無逾於此其或有未盡善者更願後人裁之
